.root{
  min-height:100%;width:100%;font-family:var(--body);color:var(--ink);
  -webkit-font-smoothing:antialiased;padding:14px 0 48px;position:relative;
  background:
    radial-gradient(1000px 560px at 85% -12%, rgba(46,230,214,.12), transparent 60%),
    radial-gradient(760px 520px at -12% 28%, rgba(167,139,255,.08), transparent 55%),
    radial-gradient(820px 620px at 50% 112%, rgba(46,230,214,.06), transparent 60%),
    linear-gradient(180deg, var(--bg0), var(--bg1) 42%, var(--bg0));
}
/* ambient grid + drifting scan field */
.root::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(46,230,214,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(46,230,214,.03) 1px, transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse 92% 72% at 50% 18%, black 38%, transparent 100%);
}
.root::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(46,230,214,.018) 3px, rgba(0,0,0,0) 4px);
}
.frame{max-width:480px;margin:0 auto;padding:0 16px;display:flex;flex-direction:column;gap:16px;position:relative;z-index:1}

/* boot reveal \u2014 staggered rise of each panel */
.frame > *{animation:rise .55s cubic-bezier(.2,.7,.2,1) both}
.frame > *:nth-child(1){animation-delay:.02s}
.frame > *:nth-child(2){animation-delay:.08s}
.frame > *:nth-child(3){animation-delay:.14s}
.frame > *:nth-child(4){animation-delay:.20s}
.frame > *:nth-child(5){animation-delay:.26s}
.frame > *:nth-child(6){animation-delay:.32s}
.frame > *:nth-child(7){animation-delay:.38s}
.frame > *:nth-child(n+8){animation-delay:.44s}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media (prefers-reduced-motion:reduce){.frame > *{animation:none}}

.skeleton{padding:80px 0;text-align:center;color:var(--muted);font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase;font-size:12px}

/* view switch */
.vswitch{display:flex;gap:4px;background:var(--glass2);border:1px solid var(--line);border-radius:12px;padding:4px;backdrop-filter:blur(14px)}
.vswitch button{flex:1;border:none;background:transparent;padding:10px;border-radius:8px;font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .2s}
.vswitch button.on{background:rgba(46,230,214,.13);color:var(--teal);box-shadow:inset 0 0 0 1px var(--line2), var(--glow-teal)}

/* header */
.hd{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--teal);font-weight:500;display:flex;align-items:center;gap:8px}
.eyebrow::before{content:"";width:20px;height:1px;background:linear-gradient(90deg,var(--teal),transparent);box-shadow:0 0 6px var(--teal)}
.hd h1{font-family:var(--disp);font-weight:600;font-size:27px;letter-spacing:-.02em;margin:6px 0 2px;text-shadow:0 0 26px rgba(46,230,214,.22)}
.sub{font-family:var(--mono);font-size:11.5px;color:var(--muted);letter-spacing:.06em}
.gear{border:1px solid var(--line);background:var(--glass2);width:38px;height:38px;border-radius:11px;font-size:16px;cursor:pointer;color:var(--ink2);backdrop-filter:blur(10px);transition:all .2s}
.gear:hover{border-color:var(--line2);box-shadow:var(--glow-teal);color:var(--teal)}
.samp{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-family:var(--mono);white-space:nowrap;letter-spacing:.06em}
.samp input{width:15px;height:15px;accent-color:var(--violet)}

/* glass panels with notched corners + corner ticks */
.card,.journey,.profile,.settings,.empty{
  position:relative;
  background:var(--glass);border:1px solid var(--line);
  border-radius:6px;
  clip-path:polygon(var(--notch) 0, 100% 0, 100% calc(100% - var(--notch)), calc(100% - var(--notch)) 100%, 0 100%, 0 var(--notch));
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 10px 34px -14px rgba(0,0,0,.6), inset 0 1px 0 rgba(141,248,238,.06);
  transition:border-color .25s, transform .25s, box-shadow .25s;
}
.card,.journey{padding:16px 16px 17px}
@media (hover:hover){
  .card:hover,.journey:hover{border-color:var(--line2);transform:translateY(-1px);box-shadow:0 14px 38px -14px rgba(0,0,0,.65), 0 0 26px -10px rgba(46,230,214,.22), inset 0 1px 0 rgba(141,248,238,.09)}
}
.card-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
.card-hd h2{font-family:var(--disp);font-weight:600;font-size:16px;letter-spacing:.01em;display:flex;align-items:center;gap:8px}
.card-hd h2::before{content:"";width:6px;height:6px;border-radius:1px;background:var(--teal);box-shadow:0 0 8px var(--teal);transform:rotate(45deg)}
.ctx{font-size:12.5px;color:var(--muted);line-height:1.5;margin:-4px 0 12px}

/* settings / profile */
.settings{padding:14px;display:flex;flex-direction:column;gap:10px}
.profile{overflow:hidden}
.prof-hd{display:flex;align-items:center;gap:11px;width:100%;background:transparent;border:none;padding:13px 14px;cursor:pointer;text-align:left;color:var(--ink)}
.avatar{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,rgba(46,230,214,.28),rgba(167,139,255,.22));border:1px solid var(--line2);color:var(--aqua);font-family:var(--disp);font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--glow-teal)}
.prof-id{display:flex;flex-direction:column;flex:1;min-width:0}
.prof-id b{font-size:15px;font-weight:600}
.prof-id i{font-style:normal;font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:2px;letter-spacing:.05em}
.chev{font-size:18px;color:var(--muted);transition:transform .25s}.chev.up{transform:rotate(180deg)}
.prof-body{padding:6px 14px 14px;display:flex;flex-direction:column;gap:9px;border-top:1px solid var(--line)}
.r2{display:flex;justify-content:space-between;gap:12px;align-items:baseline;padding-top:4px}
.r2-l{font-size:11px;color:var(--muted);flex-shrink:0;font-family:var(--mono);letter-spacing:.05em;text-transform:uppercase}
.r2-v{font-size:13px;text-align:right;font-weight:500;word-break:break-word}
.r2-v.miss{color:var(--amber);font-weight:400;font-style:italic}
.r2-sub{font-style:normal;font-family:var(--mono);font-size:11px;color:var(--muted)}
.full{width:100%;margin-top:6px}
.set-row{display:flex;flex-direction:column;gap:5px}
.set-row label{font-size:11px;color:var(--muted);font-weight:500;font-family:var(--mono);letter-spacing:.05em;text-transform:uppercase}
.set-row input{border:1px solid var(--line);border-radius:8px;padding:10px 11px;font-family:var(--body);font-size:15px;color:var(--ink);background:rgba(3,9,13,.55)}
.set-row input:focus{outline:none;border-color:var(--teal);box-shadow:var(--glow-teal)}
.set-row input::placeholder{color:#3C5A59}
.set-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:2px}
.ghostbtn{border:1px solid var(--line);background:transparent;border-radius:8px;padding:9px 14px;font-size:14px;cursor:pointer;color:var(--ink2)}
.ghostbtn:hover{border-color:var(--line2)}

/* HERO \u2014 command panel */
.hero{
  position:relative;padding:30px 18px 18px;overflow:hidden;
  border-radius:8px;
  clip-path:polygon(22px 0, 100% 0, 100% calc(100% - 22px), calc(100% - 22px) 100%, 0 100%, 0 22px);
  background:linear-gradient(160deg, rgba(10,33,41,.9), rgba(5,17,23,.94));
  border:1px solid var(--line2);backdrop-filter:blur(18px);
  box-shadow:0 18px 52px -18px rgba(0,0,0,.75), 0 0 70px -22px rgba(46,230,214,.3), inset 0 1px 0 rgba(141,248,238,.12);
}
.hero::before{content:"";position:absolute;inset:-45%;background:conic-gradient(from 0deg, transparent 68%, rgba(46,230,214,.07) 84%, transparent 100%);animation:sweep 16s linear infinite;pointer-events:none}
@keyframes sweep{to{transform:rotate(360deg)}}
/* HUD corner brackets */
.hud{position:absolute;width:16px;height:16px;border:1.5px solid var(--teal);opacity:.55;pointer-events:none;filter:drop-shadow(0 0 4px rgba(46,230,214,.5))}
.hud.tl{top:9px;left:9px;border-right:none;border-bottom:none}
.hud.tr{top:9px;right:9px;border-left:none;border-bottom:none}
.hud.bl{bottom:9px;left:9px;border-right:none;border-top:none}
.hud.br{bottom:9px;right:9px;border-left:none;border-top:none}
/* scan line sweeping down */
.scan{position:absolute;left:0;right:0;height:60px;top:-60px;pointer-events:none;
  background:linear-gradient(180deg, transparent, rgba(46,230,214,.10) 60%, rgba(141,248,238,.28));
  animation:scandown 5.5s ease-in-out infinite}
@keyframes scandown{0%{top:-60px;opacity:0}12%{opacity:1}55%{top:100%;opacity:.5}60%{opacity:0}100%{top:100%;opacity:0}}
.telemetry{position:absolute;top:12px;left:14px;right:14px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase}
.tel-live{display:flex;align-items:center;gap:6px;color:var(--teal)}
.tel-live i{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);animation:blink 1.6s steps(1) infinite}
@keyframes blink{50%{opacity:.25}}
@media (prefers-reduced-motion:reduce){.hero::before,.scan{animation:none}.scan{display:none}.tel-live i{animation:none}}

.orbit-wrap{position:relative;width:100%;max-width:300px;margin:0 auto;aspect-ratio:1}
.orbit{width:100%;height:auto;display:block;filter:drop-shadow(0 0 10px rgba(46,230,214,.22))}
.ring-outer{fill:none;stroke:rgba(46,230,214,.16);stroke-width:1}
.ring-rot{fill:none;stroke:rgba(141,248,238,.28);stroke-width:1;stroke-dasharray:2 12;transform-box:view-box;transform-origin:160px 160px;animation:spin 36s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tick{stroke:rgba(46,230,214,.3);stroke-width:1.4}
.arc{fill:none;stroke-width:11;stroke-linecap:round;transition:opacity .4s}
.arc-future{opacity:.16}
.arc-past{opacity:.5}
.arc-today{opacity:1}
.pointer{stroke-width:1.5;opacity:.55;stroke-dasharray:3 4}
.hub{fill:rgba(3,9,13,.9);stroke:var(--line2);stroke-width:1}
.today-core{fill:#fff}
.today-glow{opacity:.9;animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5;r:10}50%{opacity:1;r:13}}
@media (prefers-reduced-motion:reduce){.today-glow,.ring-rot{animation:none}}
.orbit-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none}
.oc-cycle{font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase}
.oc-cycle i{color:#365250;font-style:normal}
.oc-day{font-family:var(--disp);font-weight:700;font-size:50px;line-height:1;letter-spacing:-.03em;margin:3px 0 5px;text-shadow:0 0 32px rgba(46,230,214,.4)}
.oc-phase{font-family:var(--mono);font-size:11.5px;font-weight:500;letter-spacing:.16em;text-transform:uppercase}
.herofoot{text-align:center;font-size:13px;color:var(--ink2);margin-top:14px;border-top:1px solid var(--line);padding-top:12px;position:relative}
.herofoot b{color:var(--aqua);font-weight:600}
.pre,.complete{text-align:center;padding:30px 0;position:relative}
.bignum{font-family:var(--disp);font-weight:700;font-size:60px;letter-spacing:-.03em;line-height:1;text-shadow:0 0 38px rgba(46,230,214,.42)}
.prelabel{font-size:14px;color:var(--ink2);margin-top:8px}

/* tripwire \u2014 the loud alert */
.tripwire{
  display:flex;align-items:center;gap:10px;justify-content:center;width:100%;position:relative;
  background:linear-gradient(160deg, rgba(255,77,99,.14), rgba(255,77,99,.05));
  border:1px solid rgba(255,77,99,.5);color:var(--red);
  font-weight:600;font-size:14.5px;padding:14px;border-radius:6px;cursor:pointer;
  clip-path:polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
  backdrop-filter:blur(10px);box-shadow:var(--glow-red);transition:all .2s;letter-spacing:.01em;
}
.tripwire:hover{border-color:var(--red);box-shadow:0 0 26px rgba(255,77,99,.6)}
.tw-dot{width:9px;height:9px;border-radius:50%;background:var(--red);box-shadow:0 0 0 4px rgba(255,77,99,.22), 0 0 10px var(--red);animation:beat 2s ease-in-out infinite}
@keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
@media (prefers-reduced-motion:reduce){.tw-dot{animation:none}}

/* strips */
.strips{display:flex;flex-direction:column;gap:9px}
.strip{border-radius:5px;padding:11px 13px;border:1px solid var(--line);background:var(--glass2);backdrop-filter:blur(12px);clip-path:polygon(9px 0,100% 0,100% 100%,0 100%,0 9px)}
.strip-title{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;font-weight:500;margin-bottom:3px}
.strip-body{font-size:13.5px;line-height:1.45;color:var(--ink2)}.strip-body b{font-weight:600;color:var(--ink)}
.strip.teal{border-left:3px solid var(--teal);box-shadow:inset 4px 0 16px -8px rgba(46,230,214,.6)}.strip.teal .strip-title{color:var(--teal)}
.strip.amber{border-left:3px solid var(--amber);box-shadow:inset 4px 0 16px -8px rgba(255,180,84,.6)}.strip.amber .strip-title{color:var(--amber)}
.strip.slate{border-left:3px solid var(--muted)}.strip.slate .strip-title{color:var(--muted)}
.strip.violet{border-left:3px solid var(--violet);box-shadow:inset 4px 0 16px -8px rgba(167,139,255,.6)}.strip.violet .strip-title{color:var(--violet)}
.strip.ghost{border-left:3px solid var(--line);background:transparent}.strip.ghost .strip-title{color:var(--muted)}

/* check-in */
.datepick{border:1px solid var(--line);border-radius:8px;padding:6px 9px;font-family:var(--mono);font-size:12px;color:var(--ink2);background:rgba(3,9,13,.55);color-scheme:dark}
.datepick:focus{outline:none;border-color:var(--teal);box-shadow:var(--glow-teal)}
.syms{display:flex;flex-direction:column;gap:14px}
.sym{display:flex;flex-direction:column;align-items:stretch;gap:8px}
.sym-txt{flex:1;min-width:0}.sym-label{font-size:13.5px;font-weight:500;line-height:1.25}.sym-hint{font-size:11.5px;color:var(--muted);margin-top:1px}
.seg{display:flex;gap:5px;flex-shrink:0}
.seg-full{width:100%}
.seg-full .seg-btn{flex:1;width:auto;min-width:0}
.scalekey{font-family:var(--mono);font-size:9.5px;color:var(--muted);text-align:center;padding-top:4px;line-height:1.6;letter-spacing:.04em}
.seg-btn{width:34px;height:38px;border-radius:7px;border:1px solid var(--line);background:rgba(3,9,13,.5);font-family:var(--mono);font-size:13px;color:var(--muted);cursor:pointer;transition:all .15s}
.seg-btn.wide{width:auto;padding:0 12px;font-family:var(--body);font-size:12.5px;text-transform:capitalize}
.seg-btn:hover{border-color:var(--line2);color:var(--ink2)}
.seg-btn.on{color:#03161A;font-weight:700;border-color:transparent}
.seg-btn.on.s0{background:#3DDC97;box-shadow:0 0 12px rgba(61,220,151,.5)}
.seg-btn.on.s1{background:#9BE05A;box-shadow:0 0 12px rgba(155,224,90,.5)}
.seg-btn.on.s2{background:#FFD45E;box-shadow:0 0 12px rgba(255,212,94,.5)}
.seg-btn.on.s3{background:#FFB454;box-shadow:0 0 12px rgba(255,180,84,.55)}
.seg-btn.on.s4{background:#FF8A5C;box-shadow:0 0 12px rgba(255,138,92,.55)}
.seg-btn.on.s5{background:#FF4D63;box-shadow:0 0 14px rgba(255,77,99,.65);color:#fff}

.wins{display:flex;flex-direction:column;gap:13px;margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
.win-label{font-size:13px;font-weight:600;margin-bottom:7px}
.win-temp{grid-column:1 / -1}
.temp-row{display:flex;gap:10px;align-items:flex-end}
.temp-cell{display:flex;flex-direction:column;gap:4px;flex:1}
.temp-tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.temp-input{border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-family:var(--disp);font-weight:600;font-size:17px;color:var(--ink);background:rgba(3,9,13,.55);width:100%}
.temp-input:focus{outline:none;border-color:var(--teal);box-shadow:var(--glow-teal)}
.temp-input::placeholder{color:#3C5A59}
.temp-avg{font-family:var(--disp);font-weight:700;font-size:20px;color:var(--aqua);padding:6px 0}
.temp-avg.fever{color:var(--red);text-shadow:0 0 12px rgba(255,77,99,.5)}
.temp-flag{margin-top:9px;width:100%;background:rgba(255,77,99,.12);border:1px solid rgba(255,77,99,.5);color:#FFC2CA;border-radius:8px;padding:9px 12px;font-size:12.5px;cursor:pointer;text-align:left}
.win-sub{font-weight:400;color:var(--muted);font-family:var(--mono);font-size:11px;margin-left:4px}
.counter{display:flex;align-items:center;gap:14px}
.counter button{width:36px;height:36px;border-radius:8px;border:1px solid var(--line);background:rgba(3,9,13,.5);font-size:18px;cursor:pointer;color:var(--ink2);transition:all .15s}
.counter button:hover{border-color:var(--teal);color:var(--teal);box-shadow:var(--glow-teal)}
.count{font-family:var(--disp);font-weight:600;font-size:22px;display:flex;align-items:baseline;gap:6px}
.count i{font-style:normal;font-family:var(--body);font-size:12px;font-weight:400;color:var(--muted)}
.dots{display:flex;gap:5px;margin-top:8px}
.hd-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--line2);transition:all .2s}
.hd-dot.full{background:var(--teal);border-color:var(--teal);box-shadow:0 0 8px rgba(46,230,214,.65)}
.wt-input{width:90px;text-align:center;border:1px solid var(--line);border-radius:8px;padding:7px;font-family:var(--disp);font-weight:600;font-size:18px;color:var(--aqua);background:rgba(3,9,13,.55)}
.wt-input:focus{outline:none;border-color:var(--teal);box-shadow:var(--glow-teal)}
.wt-input::placeholder{color:#3C5A59}

.save{position:relative;overflow:hidden;margin-top:16px;width:100%;background:linear-gradient(135deg, rgba(46,230,214,.95), rgba(46,200,230,.9));color:#03161A;border:none;border-radius:7px;padding:14px;font-weight:700;font-size:15px;cursor:pointer;transition:all .2s;box-shadow:var(--glow-teal);font-family:var(--body);letter-spacing:.02em}
.save::after{content:"";position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);transform:skewX(-20deg);animation:sheen 4.5s ease-in-out infinite}
@keyframes sheen{0%,75%{left:-60%}90%{left:130%}100%{left:130%}}
@media (prefers-reduced-motion:reduce){.save::after{display:none}}
.save:hover{box-shadow:0 0 28px rgba(46,230,214,.55)}
.save.ok{background:var(--green);box-shadow:0 0 20px rgba(61,220,151,.55)}
.save.sm{padding:9px 16px;width:auto;margin-top:0;font-size:14px}
.save:disabled{opacity:.6;cursor:default}
.lastsaved{text-align:center;font-size:11px;color:var(--muted);margin-top:8px;font-family:var(--mono);letter-spacing:.05em}

/* weight */
.wt-now{font-family:var(--disp);font-weight:600;font-size:18px;color:var(--aqua);text-shadow:0 0 14px rgba(46,230,214,.4)}
.wt-stats{display:flex;gap:22px;margin:-2px 0 12px}
.wt-stat{display:flex;flex-direction:column}
.wt-stat i{font-style:normal;font-size:10px;color:var(--muted);font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase}
.wt-stat b{font-family:var(--disp);font-size:19px;font-weight:600;line-height:1.25}
.wt-stat b.down{color:var(--amber)}.wt-stat b.up{color:var(--green)}
.wt-stat span{font-family:var(--mono);font-size:10.5px;color:var(--muted)}
.wt-flag{margin-top:10px;background:rgba(255,180,84,.1);border:1px solid rgba(255,180,84,.38);color:#FFCE8A;border-radius:8px;padding:9px 12px;font-size:12.5px;line-height:1.45}

/* journey */
.j-hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px}
.j-hd h2{font-family:var(--disp);font-weight:600;font-size:15px}
.jpct{font-family:var(--mono);font-size:13px;color:var(--teal);font-weight:500;text-shadow:0 0 10px rgba(46,230,214,.45)}
.jrow{display:flex;gap:4px}
.jcell{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
