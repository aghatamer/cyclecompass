@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --bg0:#03090D; --bg1:#061319; --bg2:#0A2129;
  --glass:rgba(9,28,35,.62); --glass2:rgba(14,38,47,.46);
  --line:rgba(64,224,208,.16); --line2:rgba(64,224,208,.34);
  --ink:#E9F6F4; --ink2:#B6D4D1; --muted:#618483;
  --teal:#2EE6D6; --aqua:#8DF8EE; --amber:#FFB454; --violet:#A78BFF;
  --green:#3DDC97; --red:#FF4D63;
  --glow-teal:0 0 14px rgba(46,230,214,.4);
  --glow-red:0 0 18px rgba(255,77,99,.45);
  --disp:'Space Grotesk',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --notch:14px;
}
*{box-sizing:border-box}
.root{
  min-height:100%;width:100%;font-family:var(--body);color:var(--ink);
  -webkit-font-smoothing:antialiased;padding:14px 0 48px;position:relative;
  background:
    radial-gradient(1000px 560px at 85% -12%, rgba(46,230,214,.12), transparent 60%),
    radial-gradient(760px 520px at -12% 28%, rgba(167,139,255,.08), transparent 55%),
    radial-gradient(820px 620px at 50% 112%, rgba(46,230,214,.06), transparent 60%),
    linear-gradient(180deg, var(--bg0), var(--bg1) 42%, var(--bg0));
}
/* ambient grid + drifting scan field */
.root::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(46,230,214,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(46,230,214,.03) 1px, transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse 92% 72% at 50% 18%, black 38%, transparent 100%);
}
.root::after{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(46,230,214,.018) 3px, rgba(0,0,0,0) 4px);
}
.frame{max-width:480px;margin:0 auto;padding:0 16px;display:flex;flex-direction:column;gap:16px;position:relative;z-index:1}

/* boot reveal \u2014 staggered rise of each panel */
.frame > *{animation:rise .55s cubic-bezier(.2,.7,.2,1) both}
.frame > *:nth-child(1){animation-delay:.02s}
.frame > *:nth-child(2){animation-delay:.08s}
.frame > *:nth-child(3){animation-delay:.14s}
.frame > *:nth-child(4){animation-delay:.20s}
.frame > *:nth-child(5){animation-delay:.26s}
.frame > *:nth-child(6){animation-delay:.32s}
.frame > *:nth-child(7){animation-delay:.38s}
.frame > *:nth-child(n+8){animation-delay:.44s}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@media (prefers-reduced-motion:reduce){.frame > *{animation:none}}

.skeleton{padding:80px 0;text-align:center;color:var(--muted);font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase;font-size:12px}

/* view switch */
.vswitch{display:flex;gap:4px;background:var(--glass2);border:1px solid var(--line);border-radius:12px;padding:4px;backdrop-filter:blur(14px)}
.vswitch button{flex:1;border:none;background:transparent;padding:10px;border-radius:8px;font-family:var(--mono);font-weight:500;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .2s}
.vswitch button.on{background:rgba(46,230,214,.13);color:var(--teal);box-shadow:inset 0 0 0 1px var(--line2), var(--glow-teal)}

/* header */
.hd{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--teal);font-weight:500;display:flex;align-items:center;gap:8px}
.eyebrow::before{content:"";width:20px;height:1px;background:linear-gradient(90deg,var(--teal),transparent);box-shadow:0 0 6px var(--teal)}
.hd h1{font-family:var(--disp);font-weight:600;font-size:27px;letter-spacing:-.02em;margin:6px 0 2px;text-shadow:0 0 26px rgba(46,230,214,.22)}
.sub{font-family:var(--mono);font-size:11.5px;color:var(--muted);letter-spacing:.06em}
.gear{border:1px solid var(--line);background:var(--glass2);width:38px;height:38px;border-radius:11px;font-size:16px;cursor:pointer;color:var(--ink2);backdrop-filter:blur(10px);transition:all .2s}
.gear:hover{border-color:var(--line2);box-shadow:var(--glow-teal);color:var(--teal)}
.samp{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-family:var(--mono);white-space:nowrap;letter-spacing:.06em}
.samp input{width:15px;height:15px;accent-color:var(--violet)}

/* glass panels with notched corners + corner ticks */
.card,.journey,.profile,.settings,.empty{
  position:relative;
  background:var(--glass);border:1px solid var(--line);
  border-radius:6px;
  clip-path:polygon(var(--notch) 0, 100% 0, 100% calc(100% - var(--notch)), calc(100% - var(--notch)) 100%, 0 100%, 0 var(--notch));
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  box-shadow:0 10px 34px -14px rgba(0,0,0,.6), inset 0 1px 0 rgba(141,248,238,.06);
  transition:border-color .25s, transform .25s, box-shadow .25s;
}
.card,.journey{padding:16px 16px 17px}
@media (hover:hover){
  .card:hover,.journey:hover{border-color:var(--line2);transform:translateY(-1px);box-shadow:0 14px 38px -14px rgba(0,0,0,.65), 0 0 26px -10px rgba(46,230,214,.22), inset 0 1px 0 rgba(141,248,238,.09)}
}
.card-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px}
.card-hd h2{font-family:var(--disp);font-weight:600;font-size:16px;letter-spacing:.01em;display:flex;align-items:center;gap:8px}
.card-hd h2::before{content:"";width:6px;height:6px;border-radius:1px;background:var(--teal);box-shadow:0 0 8px var(--teal);transform:rotate(45deg)}
.ctx{font-size:12.5px;color:var(--muted);line-height:1.5;margin:-4px 0 12px}

/* settings / profile */
.settings{padding:14px;display:flex;flex-direction:column;gap:10px}
.profile{overflow:hidden}
.prof-hd{display:flex;align-items:center;gap:11px;width:100%;background:transparent;border:none;padding:13px 14px;cursor:pointer;text-align:left;color:var(--ink)}
.avatar{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,rgba(46,230,214,.28),rgba(167,139,255,.22));border:1px solid var(--line2);color:var(--aqua);font-family:var(--disp);font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--glow-teal)}
.prof-id{display:flex;flex-direction:column;flex:1;min-width:0}
.prof-id b{font-size:15px;font-weight:600}
.prof-id i{font-style:normal;font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:2px;letter-spacing:.05em}
.chev{font-size:18px;color:var(--muted);transition:transform .25s}.chev.up{transform:rotate(180deg)}
.prof-body{padding:6px 14px 14px;display:flex;flex-direction:column;gap:9px;border-top:1px solid var(--line)}
.r2{display:flex;justify-content:space-between;gap:12px;align-items:baseline;padding-top:4px}
.r2-l{font-size:11px;color:var(--muted);flex-shrink:0;font-family:var(--mono);letter-spacing:.05em;text-transform:uppercase}
.r2-v{font-size:13px;text-align:right;font-weight:500;word-break:break-word}
.r2-v.miss{color:var(--amber);font-weight:400;font-style:italic}
.r2-sub{font-style:normal;font-family:var(--mono);font-size:11px;color:var(--muted)}
.full{width:100%;margin-top:6px}
.set-row{display:flex;flex-direction:column;gap:5px}
.set-row label{font-size:11px;color:var(--muted);font-weight:500;font-family:var(--mono);letter-spacing:.05em;text-transform:uppercase}
.set-row input{border:1px solid var(--line);border-radius:8px;padding:10px 11px;font-family:var(--body);font-size:15px;color:var(--ink);background:rgba(3,9,13,.55)}
.set-row input:focus{outline:none;border-color:var(--teal);box-shadow:var(--glow-teal)}
.set-row input::placeholder{color:#3C5A59}
.set-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:2px}
.ghostbtn{border:1px solid var(--line);background:transparent;border-radius:8px;padding:9px 14px;font-size:14px;cursor:pointer;color:var(--ink2)}
.ghostbtn:hover{border-color:var(--line2)}

/* HERO \u2014 command panel */
.hero{
  position:relative;padding:30px 18px 18px;overflow:hidden;
  border-radius:8px;
  clip-path:polygon(22px 0, 100% 0, 100% calc(100% - 22px), calc(100% - 22px) 100%, 0 100%, 0 22px);
  background:linear-gradient(160deg, rgba(10,33,41,.9), rgba(5,17,23,.94));
  border:1px solid var(--line2);backdrop-filter:blur(18px);
  box-shadow:0 18px 52px -18px rgba(0,0,0,.75), 0 0 70px -22px rgba(46,230,214,.3), inset 0 1px 0 rgba(141,248,238,.12);
}
.hero::before{content:"";position:absolute;inset:-45%;background:conic-gradient(from 0deg, transparent 68%, rgba(46,230,214,.07) 84%, transparent 100%);animation:sweep 16s linear infinite;pointer-events:none}
@keyframes sweep{to{transform:rotate(360deg)}}
/* HUD corner brackets */
.hud{position:absolute;width:16px;height:16px;border:1.5px solid var(--teal);opacity:.55;pointer-events:none;filter:drop-shadow(0 0 4px rgba(46,230,214,.5))}
.hud.tl{top:9px;left:9px;border-right:none;border-bottom:none}
.hud.tr{top:9px;right:9px;border-left:none;border-bottom:none}
.hud.bl{bottom:9px;left:9px;border-right:none;border-top:none}
.hud.br{bottom:9px;right:9px;border-left:none;border-top:none}
/* scan line sweeping down */
.scan{position:absolute;left:0;right:0;height:60px;top:-60px;pointer-events:none;
  background:linear-gradient(180deg, transparent, rgba(46,230,214,.10) 60%, rgba(141,248,238,.28));
  animation:scandown 5.5s ease-in-out infinite}
@keyframes scandown{0%{top:-60px;opacity:0}12%{opacity:1}55%{top:100%;opacity:.5}60%{opacity:0}100%{top:100%;opacity:0}}

.cyc-btn{flex:1;min-width:20px;height:28px;border-radius:6px;border:1px solid var(--line);background:rgba(3,9,13,.5);font-family:var(--mono);font-size:11.5px;color:var(--ink2);cursor:pointer;transition:all .15s}
.cyc-btn:hover{border-color:var(--line2)}
.cyc-btn.on{background:rgba(46,230,214,.18);color:var(--teal);border-color:var(--teal);box-shadow:var(--glow-teal)}
.cyc-btn.nodata{opacity:.3;cursor:default}
.mode-toggle{display:flex;gap:3px;background:rgba(3,9,13,.55);border:1px solid var(--line);border-radius:8px;padding:3px}
.mode-toggle button{border:none;background:transparent;padding:5px 11px;border-radius:6px;font-family:var(--mono);font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);cursor:pointer;font-weight:500;transition:all .15s}
.mode-toggle button.on{background:rgba(46,230,214,.15);color:var(--teal);box-shadow:inset 0 0 0 1px var(--line2)}
.ready.warn{border-color:rgba(255,77,99,.42);box-shadow:0 10px 34px -14px rgba(0,0,0,.6), 0 0 28px -10px rgba(255,77,99,.32)}
.ready.ok{border-color:rgba(61,220,151,.36);box-shadow:0 10px 34px -14px rgba(0,0,0,.6), 0 0 24px -10px rgba(61,220,151,.24)}
.ready-msg{font-size:13.5px;line-height:1.55;color:var(--ink2)}.ready-msg b{font-weight:600;color:var(--ink)}
.nextd{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.05em}
.exprow{display:flex;gap:9px}
.expbtn{flex:1;border:none;background:linear-gradient(135deg, rgba(46,230,214,.92), rgba(46,200,230,.88));color:#03161A;border-radius:7px;padding:12px;font-weight:700;font-size:14px;cursor:pointer;box-shadow:var(--glow-teal);transition:all .2s}
.expbtn:hover{box-shadow:0 0 24px rgba(46,230,214,.55)}
.expbtn.ghost{background:transparent;border:1px solid var(--line2);color:var(--ink2);box-shadow:none}
.expbtn.ghost:hover{border-color:var(--teal);color:var(--teal)}
.expbtn:disabled{opacity:.45;cursor:default;box-shadow:none}

/* narrative summary */
.narrative{border-color:var(--line2);box-shadow:0 10px 34px -14px rgba(0,0,0,.6), 0 0 26px -12px rgba(46,230,214,.2), inset 0 1px 0 rgba(141,248,238,.06)}
.mini-copy{border:1px solid var(--line2);background:rgba(46,230,214,.1);color:var(--teal);border-radius:7px;font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;padding:6px 12px;cursor:pointer}
.mini-copy:hover{box-shadow:var(--glow-teal)}
.nar-p{font-size:13.5px;line-height:1.6;color:var(--ink2);margin:0 0 10px}
.nar-p:first-of-type{color:var(--ink);font-size:14px}
.nar-discuss{margin-top:6px;padding-top:12px;border-top:1px solid var(--line)}
.nar-sub{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin-bottom:8px}
.nar-discuss ul{margin:0;padding-left:0;list-style:none;display:flex;flex-direction:column;gap:7px}
.nar-discuss li{font-size:13px;line-height:1.45;color:var(--ink2);padding-left:18px;position:relative}
.nar-discuss li::before{content:"\u25B8";position:absolute;left:0;color:var(--teal)}

/* upcoming dates timeline */
.nd-timeline{display:flex;flex-direction:column}
.nd-step{display:flex;gap:13px}
.nd-node{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:14px}
.nd-dot{width:14px;height:14px;border-radius:50%;border:2px solid;background:var(--bg1);margin-top:3px;z-index:1}
.nd-line{flex:1;width:2px;background:linear-gradient(180deg,var(--line2),var(--line));margin:2px 0;min-height:18px}
.nd-body{flex:1;padding-bottom:16px}
.nd-step:last-child .nd-body{padding-bottom:0}
.nd-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.nd-tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.nd-cd{font-family:var(--mono);font-size:11px;color:var(--aqua)}
.nd-label{font-family:var(--disp);font-weight:600;font-size:15px;margin-top:2px}
.nd-date{font-size:13px;color:var(--ink2);margin-top:1px}
.s-blood .nd-dot{border-color:var(--violet);box-shadow:0 0 8px rgba(167,139,255,.5)}
.s-blood .nd-cd{color:var(--violet)}
.s-inf .nd-dot{border-color:var(--teal);box-shadow:0 0 8px rgba(46,230,214,.6)}
.s-pump .nd-dot{border-color:var(--amber);box-shadow:0 0 8px rgba(255,180,84,.5)}
.s-pump .nd-cd{color:var(--amber)}

/* blood test */
.bt-next{display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid var(--line2);background:rgba(46,230,214,.07);border-radius:8px;padding:11px 13px;margin-bottom:12px;clip-path:polygon(9px 0,100% 0,100% 100%,0 100%,0 9px)}
.bt-next-l{display:flex;flex-direction:column;gap:2px;min-width:0}
.bt-tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal)}
.bt-next-l b{font-family:var(--disp);font-size:15px;font-weight:600;color:var(--ink)}
.bt-next-l i{font-style:normal;font-size:11.5px;color:var(--muted)}
.bt-count{font-family:var(--mono);font-size:13px;color:var(--aqua);white-space:nowrap;text-shadow:0 0 10px rgba(46,230,214,.4)}
.bt-list{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.bt-row{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:7px;padding:7px 10px;background:rgba(3,9,13,.4)}
.bt-row-date{font-family:var(--mono);font-size:11px;color:var(--ink2);white-space:nowrap;display:flex;align-items:center;gap:5px}
.clip{cursor:pointer;filter:grayscale(.2)}
.bt-chips{display:flex;flex-wrap:wrap;gap:5px 9px;flex:1;min-width:0}
.bt-chip{font-family:var(--mono);font-size:11px;font-weight:500}
.bt-actions{display:flex;gap:4px}
.bt-actions button{border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:6px;font-size:11px;padding:3px 7px;cursor:pointer}
.bt-actions button:hover{border-color:var(--line2);color:var(--ink2)}
.bt-form{display:flex;flex-direction:column;gap:11px}
.bt-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.bt-field{display:flex;flex-direction:column;gap:4px}
.bt-field label{font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;color:var(--muted);text-transform:uppercase}
.bt-field label i{font-style:normal;text-transform:none;opacity:.7}
.bt-field input{border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-family:var(--disp);font-weight:600;font-size:16px;color:var(--ink);background:rgba(3,9,13,.55);transition:all .15s}
.bt-field input:focus{outline:none;border-color:var(--teal);box-shadow:var(--glow-teal)}
.bt-field input::placeholder{color:#3C5A59}
.bt-url{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 11px;font-family:var(--mono);font-size:12.5px;color:var(--ink);background:rgba(3,9,13,.55)}
.bt-url:focus{outline:none;border-color:var(--teal);box-shadow:var(--glow-teal)}
.bt-url::placeholder{color:#3C5A59}

/* gate */
.gate{display:flex;flex-direction:column;gap:3px;border-radius:8px;padding:10px 13px;margin-bottom:12px;border:1px solid var(--line)}
.gate.ok{background:rgba(61,220,151,.08);border-color:rgba(61,220,151,.4)}
.gate.caution{background:rgba(255,180,84,.08);border-color:rgba(255,180,84,.42)}

.gate-tag{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase}
.gate.ok .gate-tag{color:var(--green)}.gate.caution .gate-tag{color:var(--amber)}.gate.low .gate-tag{color:var(--red)}
.gate-body{font-size:13px;line-height:1.5;color:var(--ink2)}
.bm-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
.bm-hd{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;color:var(--muted);font-family:var(--mono);letter-spacing:.04em;text-transform:uppercase;margin-bottom:2px}
.bm-hd b{font-family:var(--disp);font-size:15px;display:flex;align-items:baseline;gap:3px}
.bm-hd b i{font-style:normal;font-family:var(--mono);font-size:9px;color:var(--muted)}
.ref-band{fill:rgba(46,230,214,.07)}
.storage-warn{background:rgba(255,180,84,.12);border-color:rgba(255,180,84,.45);color:#FFD49A;display:flex;flex-direction:column;gap:9px}
.storage-warn b{color:var(--amber);letter-spacing:.06em}
.bk-now{align-self:flex-start;background:rgba(255,180,84,.18);border:1px solid rgba(255,180,84,.5);color:#FFE0B5;font-family:var(--body);font-weight:600;font-size:13px;padding:8px 16px;border-radius:8px;cursor:pointer}
.bk-now:hover{background:rgba(255,180,84,.28)}
.selftest{border-radius:10px;padding:11px 13px;border:1px solid var(--line);background:var(--glass2);backdrop-filter:blur(12px);display:flex;flex-direction:column;gap:7px}
.selftest.pass{border-color:rgba(61,220,151,.45);background:rgba(61,220,151,.07)}
.selftest.fail{border-color:rgba(255,77,99,.5);background:rgba(255,77,99,.09);box-shadow:0 0 22px -10px rgba(255,77,99,.5)}
.selftest.first{border-color:rgba(46,230,214,.4);background:rgba(46,230,214,.06)}
.st-row{display:flex;justify-content:space-between;align-items:center}
.st-tag{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--teal)}
.st-launch{font-family:var(--mono);font-size:11px;color:var(--ink2)}
.st-msg{font-size:12.5px;line-height:1.5;color:var(--ink2)}
.st-msg.ok{color:#BDEFD6}.st-msg.bad{color:#FFC2CA}
.st-msg b{color:var(--ink)}
.st-sub{font-family:var(--mono);font-size:9.5px;color:var(--muted);letter-spacing:.02em;word-break:break-word}
.st-actions{display:flex;gap:8px}
.st-actions button{flex:1;border:1px solid var(--line2);background:transparent;color:var(--ink2);border-radius:7px;font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;padding:8px;cursor:pointer}
.st-actions button:hover{border-color:var(--teal);color:var(--teal)}
.st-actions .bk-now{flex:1;align-self:auto;text-transform:uppercase;font-family:var(--mono);font-size:11px;letter-spacing:.05em;font-weight:500}
.bk-area{width:100%;height:120px;border:1px solid var(--line);border-radius:8px;background:rgba(3,9,13,.6);color:var(--ink2);font-family:var(--mono);font-size:11px;padding:10px;resize:vertical;line-height:1.4}

.bk-row{display:flex;gap:8px;margin-top:6px}
.bk-row .ghostbtn{flex:1;text-align:center;font-size:13px}
.bk-msg{font-family:var(--mono);font-size:11px;color:var(--teal);margin-top:7px;letter-spacing:.03em}
